name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -v ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Capture Go version
        run: echo "GOVERSION=$(go version | awk '{print $3}')" >> "$GITHUB_ENV"

      - name: Build binary
        run: |
          go build -ldflags="-s -w -X main.version=$(git describe --tags --always --dirty) -X main.commit=$(git rev-parse --short HEAD) -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X main.goVersion=$GOVERSION" \
            -o openvpn-as-exporter ./cmd/openvpn-as-exporter

      - name: Build Docker image (multi-stage)
        run: docker build -f deployments/Dockerfile.legacy -t openvpn-as-exporter .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-as-exporter-linux-amd64
          path: openvpn-as-exporter

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile.legacy
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
